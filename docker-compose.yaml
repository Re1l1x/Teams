services:
  postgres:
    image: postgres:17
    container_name: teams_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: people_groups

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .

    container_name: teams_api

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8080:8080"

    restart: unless-stopped

volumes:
  postgres_data:
